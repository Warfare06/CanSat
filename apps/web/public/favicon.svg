<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#ff8c00"/>
    </linearGradient>
  </defs>
  <!-- Orbit ring -->
  <ellipse cx="32" cy="32" rx="28" ry="10" stroke="url(#g1)" stroke-width="1.5" transform="rotate(-20 32 32)" opacity="0.6"/>
  <!-- Satellite body -->
  <rect x="22" y="18" width="20" height="28" rx="4" stroke="#00d4ff" stroke-width="2"/>
  <line x1="22" y1="26" x2="42" y2="26" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
  <line x1="22" y1="38" x2="42" y2="38" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
  <!-- Antenna -->
  <line x1="32" y1="18" x2="32" y2="10" stroke="#ff8c00" stroke-width="2" stroke-linecap="round"/>
  <circle cx="32" cy="8" r="2" fill="#ff8c00"/>
  <!-- Solar panels -->
  <rect x="10" y="24" width="10" height="16" rx="1" stroke="#00d4ff" stroke-width="1.5" fill="rgba(0,212,255,0.1)"/>
  <rect x="44" y="24" width="10" height="16" rx="1" stroke="#00d4ff" stroke-width="1.5" fill="rgba(0,212,255,0.1)"/>
</svg>