; =============================================================================
; CanSat Astra Maven — Flight Computer
; PlatformIO Configuration
; =============================================================================
;
; Board:     ESP32 DevKit v1 (or compatible)
; Framework: Arduino
;
; To build:  pio run
; To flash:  pio run --target upload
; To monitor: pio device monitor --baud 115200
; =============================================================================

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

; --- Serial Monitor ---
monitor_speed = 115200

; --- Library Dependencies ---
lib_deps =
    ; BMP280 barometric pressure sensor
    adafruit/Adafruit BMP280 Library@^2.6.8
    adafruit/Adafruit Unified Sensor@^1.1.14

    ; MPU6050 inertial measurement unit
    electroniccats/MPU6050@^1.3.0

    ; GPS NMEA parsing
    mikalhart/TinyGPSPlus@^1.0.3

    ; MQTT client
    knolleary/PubSubClient@^2.8

    ; JSON serialization
    bblanchon/ArduinoJson@^7.0.4

; --- Build Flags ---
build_flags =
    -DCORE_DEBUG_LEVEL=3         ; Enable ESP32 debug logging (0=None, 5=Verbose)
    -DARDUINO_RUNNING_CORE=1     ; Run Arduino on core 1

; --- Upload Settings ---
; Uncomment and set your COM port if auto-detect fails
; upload_port = COM3
upload_speed = 921600

; --- Partition Table ---
; Use a partition scheme with more program space
board_build.partitions = default.csv
