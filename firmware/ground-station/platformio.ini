; =============================================================================
; CanSat Astra Maven — Ground Station Bridge
; PlatformIO Configuration
; =============================================================================
;
; Board:     ESP32 DevKit v1 (or compatible)
; Framework: Arduino
;
; This ground station receives LoRa telemetry from the flight computer
; and bridges it to MQTT via WiFi. It also displays status on an OLED.
;
; To build:  pio run
; To flash:  pio run --target upload
; To monitor: pio device monitor --baud 115200
; =============================================================================

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

; --- Serial Monitor ---
monitor_speed = 115200

; --- Library Dependencies ---
lib_deps =
    ; LoRa radio module (SX1276/SX1278)
    sandeepmistry/LoRa@^0.8.0

    ; SSD1306 OLED display
    adafruit/Adafruit SSD1306@^2.5.9
    adafruit/Adafruit GFX Library@^1.11.9

    ; MQTT client
    knolleary/PubSubClient@^2.8

    ; JSON serialization
    bblanchon/ArduinoJson@^7.0.4

; --- Build Flags ---
build_flags =
    -DCORE_DEBUG_LEVEL=3

; --- Upload Settings ---
; upload_port = COM4
upload_speed = 921600

board_build.partitions = default.csv
